# zone-daemon config - Server A (DigitalOcean SFO droplet, user: travis)
# Deploy to: /opt/infantry/scripts/zone-daemon.conf   (chmod 600)
# NOTE: SUPABASE_SERVICE_KEY is injected at deploy time - never commit the real key.

SERVER_KEY="serverA"
SERVER_LABEL="Server A — SFO droplet (167.71.118.224)"
ZONES_BASE="/opt/infantry"
REBUILD_SCRIPT="/opt/infantry/scripts/rebuild-zones.sh"

SUPABASE_URL="https://nkinpmqnbcjaftqduujf.supabase.co"
SUPABASE_SERVICE_KEY="__INJECT_AT_DEPLOY__"

# tag -> zone folder (relative to ZONES_BASE). Matches rebuild-zones.sh.
declare -A ZONE_DIRS=(
  [bhx]="Arcade - Bug Hunt XD"
  [sk]="Skirmish - Minimaps"
  [tzmolo]="Test Zone - Molo"
  [usl]="League - USL Matches"
)
# tag -> display name shown in the admin UI
declare -A ZONE_NAMES=(
  [bhx]="Arcade - Bug Hunt XD"
  [sk]="Skirmish - Minimaps"
  [tzmolo]="Test Zone - Molo"
  [usl]="League - USL Matches"
)

# usl2 - "USL - KS10" (zoneid 120) hosted on Server A after B's OVH edge firewall
# blocked opening new ports for it (only B's live 9550/9551 are open at the OVH edge,
# which we don't control). Runs on 9552/9553, inside A's already-open 9550:9570 ufw range.
ZONE_DIRS[usl2]="League - USL Matches2"
ZONE_NAMES[usl2]="USL - KS10"
