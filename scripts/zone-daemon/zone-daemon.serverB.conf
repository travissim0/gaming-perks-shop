# zone-daemon config - Server B (OVH vps-34092587, user: freeinfantry)
# Deploy to: /home/freeinfantry/zones/scripts/zone-daemon.conf   (chmod 600)
# NOTE: SUPABASE_SERVICE_KEY is injected at deploy time - never commit the real key.

SERVER_KEY="serverB"
SERVER_LABEL="Server B — OVH vps (51.81.82.133)"
ZONES_BASE="/home/freeinfantry/zones"
REBUILD_SCRIPT="/home/freeinfantry/zones/scripts/rebuild-zones.sh"

SUPABASE_URL="https://nkinpmqnbcjaftqduujf.supabase.co"
SUPABASE_SERVICE_KEY="__INJECT_AT_DEPLOY__"

# tag -> zone folder (relative to ZONES_BASE). All live zones run on B now: Server A
# (the DigitalOcean droplet) was decommissioned 2026-07-24 for lack of DDoS protection,
# so B is the only/default server on /admin/zones.
# The tag MUST match the screen name the zone runs under (the daemon marks a zone
# RUNNING by finding a screen named exactly <tag>). Validated live 2026-07-24:
#   sb=Arcade - Soccer Brawl(9023/zid47)  ct=Chamberts Tournament(9071/zid83)
#   tt=Test Zone - Molo(9101/zid100)      usl=League - USL Matches(9163/zid159)
#   minimaps=Skirmish - Minimaps(9079/zid6)   usl2=League - USL Matches2 (standby)
# NOTE: usl2 (zoneid 120) is a standby folder; zoneid 120 must run on ONLY ONE host at
# a time (two instances fight over the single game-DB login).
declare -A ZONE_DIRS=(
  [usl]="League - USL Matches"
  [usl2]="League - USL Matches2"
  [minimaps]="Skirmish - Minimaps"
  [sb]="Arcade - Soccer Brawl"
  [ct]="Chamberts Tournament"
  [tt]="Test Zone - Molo"
)
# Admin-console label = backend folder name; the in-game zone-list name
# (e.g. "USL - KS10", "SKX - Triple Threat", "SK - Minimaps") comes from
# server.xml <zoneName>/the selected map, not this.
declare -A ZONE_NAMES=(
  [usl]="League - USL Matches"
  [usl2]="League - USL Matches2"
  [minimaps]="Skirmish - Minimaps"
  [sb]="Arcade - Soccer Brawl"
  [ct]="Chamberts Tournament"
  [tt]="Test Zone - Molo"
)
