# tag -> zone folder (relative to ZONES_BASE). Add zones here as they move to B.
# NOTE: usl2 (zoneid 120) is registered on BOTH servers so /admin/zones shows it
# on whichever one is running it. zoneid 120 must run on ONLY ONE of A/B at a time
# (two instances fight over the single game-DB login). B has no per-zone watchdog,
# so a B-hosted usl2 follows admin commands directly; A's usl2-watchdog is intent-aware.
declare -A ZONE_DIRS=(
  [usl]="League - USL Matches"
  [usl2]="League - USL Matches2"
)
declare -A ZONE_NAMES=(
  [usl]="League - USL Matches"
  [usl2]="USL - KS10"
)
